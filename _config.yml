title: Bhumish Gajjar
logo:  # you can add own logo.
description: Passionate security-engineer helping secure the digital world.
baseurl: "/bhumish.github.io" # the subpath of your site, e.g. /blog
url: "https://github.com/bhumish" # the base hostname & protocol for your site, e.g. http://example.com


# Author Settings
author:
  name: Bhumish Gajjar
  image: '/assets/img/0.jpeg'
  job: Cyber Security Engineer
  bio: Security Analyst with a passion in Application Security, Computer Networks and Log Analytics. Hobbies include cycling, soft trance music and learning about trains.
  email: bhumishx@gmail.com


# Contact links
contact:
  - name: Twitter
    link: https://twitter.com/bhumish
  - name: Linkedin
    link: https://linkedin.com/in/bhumish
  - name: Instagram
    link: https://instagram.com/bhumish


# Comment Section (Disqus)
disqus-identifier: mr-brown # add your shortname for Disqus Comment. For example mr-brown


# Google Analytics
google-analytics: # add your identifier. For example UA-99631805-1.


# Build settings
markdown: kramdown
permalink: pretty
plugins:
  - jekyll-sitemap
  - jekyll/tagging

# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

include:
  - _pages

# Tags
tag_page_dir:         tag
tag_page_layout:      tag-page
tag_permalink_style:  pretty

sass:
  sass_dir: _sass
  style: compressed


# Exclude from processing.
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
